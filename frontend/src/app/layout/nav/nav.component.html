<nav class="nav">
  <div class="nav-container">
    <div class="nav-links">
      <a
        *ngFor="let item of items"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }"
        class="nav-link"
      >
        {{ item.label }}
      </a>
    </div>
    <div class="nav-search">
      <app-search-button></app-search-button>
    </div>
  </div>
</nav>
