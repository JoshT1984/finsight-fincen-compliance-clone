<nav class="nav">
  <div class="nav-container">
    <a 
      *ngFor="let item of items"
      [routerLink]="item.path"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{exact: item.path === '' || item.path === '/dashboard'}"
      class="nav-link">
      {{ item.label }}
    </a>
  </div>
</nav>
