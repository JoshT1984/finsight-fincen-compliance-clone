<!-- Official website bar -->
<div class="usagovbar" role="region" aria-label="Official website banner">
  <div class="container usagovbar__inner">
    <span class="flag" aria-hidden="true"></span>
    <span>An official website of the United States government</span>
    <a href="#" aria-label="Here's how you know">Here’s how you know</a>
    <span aria-hidden="true">▾</span>
  </div>
</div>
<!-- FINCEN-like header banner -->
<header class="siteHeader">
  <div class="siteHeader__banner">
    <div class="container">
      <div class="brand">
        <div class="brand__left">
          <div class="seal" aria-hidden="true"></div>
          <div class="brand__text">
            <h1 class="brand__title">FinSight</h1>
            <div class="brand__sub">FINCEN-inspired CTR / SAR Case Management (MVP Demo)</div>
          </div>
        </div>
        <div class="brand__right">
          <ng-container *ngIf="{ isLoggedIn: identityService.isLoggedIn$ | async } as state">
            <button
              class="btn primary brand__btn"
              *ngIf="!state.isLoggedIn"
              (click)="login()"
            >
              Login
            </button>

            <button
              class="btn primary brand__btn"
              *ngIf="state.isLoggedIn"
              (click)="logout()"
            >
              Logout
            </button>

            <button
              class="btn primary brand__btn"
              *ngIf="state.isLoggedIn"
              (click)="openProfile()"
            >
              Profile
            </button>

            <ng-container *ngIf="identityService.profile$ | async as profile">
              <span
                class="role-chip"
                *ngIf="state.isLoggedIn"
                [ngClass]="'role-chip--' + profile.roleId"
                [matTooltip]="roleTooltip(profile.roleId)"
                aria-label="{{ roleTooltip(profile.roleId) }}"
              >
                <mat-icon aria-hidden="true">{{ roleIcon(profile.roleId) }}</mat-icon>
              </span>
            </ng-container>
          </ng-container>

          <img src="images/fincen-logo.png" alt="FinCEN Logo" class="fincen-logo" />
        </div>
      </div>
    </div>
  </div>
</header>
