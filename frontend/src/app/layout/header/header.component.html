<!-- Official website bar -->
<div class="usagovbar" role="region" aria-label="Official website banner">
  <div class="container usagovbar__inner">
    <span class="flag" aria-hidden="true"></span>
    <span>An official website of the United States government</span>
    <a href="#" aria-label="Here's how you know">Here’s how you know</a>
    <span aria-hidden="true">▾</span>
  </div>
</div>

<!-- FINCEN-like header banner -->
<header class="siteHeader">
  <div class="siteHeader__banner">
    <div class="container">
      <div class="brand">
        <div class="seal" aria-hidden="true"></div>
        <div class="brand__text">
          <h1 class="brand__title">FinSight</h1>
          <div class="brand__sub">FINCEN-inspired CTR / SAR Case Management (MVP Demo)</div>
        </div>
        <button
          class="btn primary brand__btn"
          *ngIf="!(loginDialog.isLoggedIn$ | async)"
          (click)="login()"
        >
          Login
        </button>
        <button
          class="btn primary brand__btn"
          *ngIf="loginDialog.isLoggedIn$ | async"
          (click)="logout()"
        >
          Profile / Logout
        </button>
        <app-login-dialog *ngIf="loginDialog.loginOpen"></app-login-dialog>
      </div>
    </div>
  </div>
</header>
