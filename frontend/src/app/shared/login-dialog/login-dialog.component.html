<div class="login-dialog">
  <div class="login-dialog__overlay" (click)="close()"></div>
  <div class="login-dialog__content">
    <h2>Login</h2>
    <form (ngSubmit)="login()">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" name="email" required />
      <label>Password</label>
      <input type="password" [(ngModel)]="password" name="password" required />
      <button type="submit" class="btn primary">Login</button>
    </form>
    <!-- <div class="login-dialog__oauth">
      <span>or login with:</span>
      <button class="btn oauth google" (click)="loginWithGoogle()">Google</button>
      <button class="btn oauth github" (click)="loginWithGithub()">GitHub</button>
    </div> -->
    <button class="login-dialog__close" (click)="close()">×</button>
  </div>
</div>
