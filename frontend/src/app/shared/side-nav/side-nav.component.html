<nav class="side-nav">
  @if (linkBasePath) {
    @for (item of navItems; track item.id) {
      <a
        [routerLink]="linkBasePath + '/' + item.id"
        routerLinkActive="active"
        [routerLinkActiveOptions]="item.id === 'overview' ? { exact: true } : { exact: false }"
        class="side-nav-link">
        {{ item.label }}
      </a>
    }
  } @else {
    @for (item of navItems; track item.id) {
      <a
        [href]="'#' + item.id"
        (click)="selectItem(item.id); $event.preventDefault()"
        [class.active]="(currentItemId ?? selectedItem) === item.id"
        class="side-nav-link">
        {{ item.label }}
      </a>
    }
  }
</nav>
