<div class="container form-container">
  <app-breadcrumbs [items]="breadcrumbItems"></app-breadcrumbs>
  <div class="form-header">
    <h1>{{ isEditMode ? 'Edit address' : 'New address' }}</h1>
    <a routerLink="/registry/addresses" class="back-link">Cancel</a>
  </div>

  @if (loading) {
    <p class="loading">Loading...</p>
  } @else if (loadError) {
    <p class="error">{{ loadError }}</p>
  } @else {
    @if (submitError) {
      <p class="error">{{ submitError }}</p>
    }
    <form (ngSubmit)="onSubmit()" class="registry-form">
      <div class="form-group">
        <label for="line1">Line 1 <span class="required">*</span></label>
        <input
          id="line1"
          type="text"
          [(ngModel)]="line1"
          name="line1"
          maxlength="256"
          required />
      </div>
      <div class="form-group">
        <label for="line2">Line 2</label>
        <input id="line2" type="text" [(ngModel)]="line2" name="line2" maxlength="256" />
      </div>
      <div class="form-group">
        <label for="city">City <span class="required">*</span></label>
        <input id="city" type="text" [(ngModel)]="city" name="city" maxlength="128" required />
      </div>
      <div class="form-group">
        <label for="state">State</label>
        <input id="state" type="text" [(ngModel)]="state" name="state" maxlength="64" />
      </div>
      <div class="form-group">
        <label for="postalCode">Postal code</label>
        <input id="postalCode" type="text" [(ngModel)]="postalCode" name="postalCode" maxlength="32" />
      </div>
      <div class="form-group">
        <label for="country">Country <span class="required">*</span></label>
        <input id="country" type="text" [(ngModel)]="country" name="country" maxlength="64" required />
      </div>
      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="saving || !line1.trim() || !city.trim() || !country.trim()">
          {{ saving ? 'Saving...' : (isEditMode ? 'Update' : 'Create') }}
        </button>
      </div>
    </form>
  }
</div>
