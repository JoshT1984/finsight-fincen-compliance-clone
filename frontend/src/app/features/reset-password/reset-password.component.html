<div class="reset-password-container">
  <h2>Reset Password</h2>
  <form (ngSubmit)="submit()" autocomplete="off">
    <div>
      <label for="password">New Password</label>
      <input id="password" type="password" [(ngModel)]="password" name="password" required />
    </div>
    <div>
      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required />
    </div>
    <div *ngIf="error" class="error">{{ error }}</div>
    <div *ngIf="success" class="success">Password reset successful! Redirecting...</div>
    <button type="submit" [disabled]="loading">Reset Password</button>
  </form>
</div>
