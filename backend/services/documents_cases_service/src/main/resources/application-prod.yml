server:
  port: ${PORT:8080}

spring:
  application:
    name: documents-cases-service

  datasource:
    # Use either DB_URL (full JDBC) OR build it from parts.
    # Recommended env vars:
    #   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS
    # For this service DB_NAME should usually be: documents_cases
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:documents_cases}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:true}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:documents-cases}
    prefer-ip-address: false
    instance-id: ${EUREKA_INSTANCE_HOSTNAME:documents-cases}:${PORT:8080}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

# Add this if the service has JwtConfig / resource server validation like compliance-event-service.
# If it truly does NOT use JWT validation, you can remove this block.
jwt:
  public-key: ${JWT_PUBLIC_KEY}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
