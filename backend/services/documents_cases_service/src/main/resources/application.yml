server:
    port: 8081

spring:
    application:
        name: documents-cases-service

    datasource:
        url: ${DB_URL:jdbc:mysql://localhost:3306/documents_cases}
        username: root
        password: Laura_W3ll3r
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: none
        open-in-view: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
                jdbc:
                    time_zone: UTC

    rabbitmq:
        host: ${RABBITMQ_HOST:localhost}
        port: ${RABBITMQ_PORT:5672}
        username: ${RABBITMQ_USERNAME:guest}
        password: ${RABBITMQ_PASSWORD:guest}
        virtual-host: /
        ssl:
            enabled: false

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/

management:
    endpoint:
        health:
            probes:
                enabled: true
    endpoints:
        web:
            exposure:
                include: health,info

jwt:
    public-key: file:/C:/public_key.pem
    private-key: file:/C:/private_key.pem

aws:
    region: ${AWS_REGION:us-east-1}
    s3:
        bucket: ${AWS_S3_BUCKET:finsight-documents-2026}

# Compliance event service (for creating CTR/SAR from PDF extraction)
compliance-event-service:
    url: ${COMPLIANCE_EVENT_SERVICE_URL:http://localhost:8085}
    connect-timeout-ms: ${COMPLIANCE_EVENT_SERVICE_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${COMPLIANCE_EVENT_SERVICE_READ_TIMEOUT_MS:30000}
