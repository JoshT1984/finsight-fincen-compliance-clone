server:
  port: ${DOCUMENTS_CASES_PORT:${PORT:8080}}

# CORS: allowed origins for frontend (comma-separated). Default: Angular dev server.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

spring:
  application:
    name: documents-cases-service
  cloud:
    compatibility-verifier:
      enabled: false
  
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:25MB}
      max-request-size: ${MAX_REQUEST_SIZE:25MB}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/finsight_documents}
    username: ${DB_USER:root}
    password: ${DB_PASS:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC

  sql:
    init:
      mode: never
      platform: mysql
      continue-on-error: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
    connection-timeout: 30000  # 30 seconds - wait for RabbitMQ if both start together

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: false

finsight:
  rabbitmq:
    queues:
      ctr-events: ${CTR_EVENTS_QUEUE:finsight.ctr.events}
      sar-events: ${SAR_EVENTS_QUEUE:finsight.sar.events}

aws:
  region: ${AWS_REGION:us-east-1}

  dynamodb:
    endpoint: ${DDB_ENDPOINT:}

  s3:
    bucket: ${DOCS_BUCKET:finsight-documents-2026}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.finsight: INFO
  file:
    name: logs/documents-cases-service.log
