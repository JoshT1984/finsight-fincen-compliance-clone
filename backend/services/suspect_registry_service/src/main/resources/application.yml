server:
  port: 8082

# CORS: allowed origins for frontend (comma-separated). Default: Angular dev server.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

spring:
  application:
    name: suspect-registry-service

  datasource:
    url: jdbc:mysql://localhost:3306/finsight_suspects
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  public-key: "${JWT_PUBLIC_KEY:}"
