server:
  port: ${PORT:8080}

spring:
  application:
    name: suspect-registry-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/finsight}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ${DB_SCHEMA:suspect_registry}
        jdbc:
          time_zone: UTC

  # For MVP/local, SQL init is fine. In shared envs, prefer Flyway.
  sql:
    init:
      mode: always
      platform: postgres
      continue-on-error: false

aws:
  region: ${AWS_REGION:us-east-1}

  sqs:
    # This service typically CONSUMES suspect upsert/enrichment requests
    # and/or PUBLISHES suspect-changed events.
    suspectRequestsQueueUrl: ${SUSPECT_REQUESTS_QUEUE_URL:}
    suspectEventsQueueUrl: ${SUSPECT_EVENTS_QUEUE_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.finsight: INFO
