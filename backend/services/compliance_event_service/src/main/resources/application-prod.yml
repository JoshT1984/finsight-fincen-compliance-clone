server:
  port: ${PORT:8080}

spring:
  application:
    name: compliance-event-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC

  sql:
    init:
      mode: ${SQL_INIT_MODE:never}

  # 🔹 RabbitMQ (Amazon MQ)
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5671}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    ssl:
      enabled: true

aws:
  region: ${AWS_REGION:us-east-1}

  sqs:
    ctrEventsQueueUrl: ${CTR_EVENTS_QUEUE_URL:}
    sarEventsQueueUrl: ${SAR_EVENTS_QUEUE_URL:}
    linkEventsQueueUrl: ${LINK_EVENTS_QUEUE_URL:}
    auditActionsQueueUrl: ${AUDIT_ACTIONS_QUEUE_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
