server:
  port: ${PORT:8080}

spring:
  application:
    name: compliance-event-service

  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:compliance_event}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:true}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:compliance-event}
    prefer-ip-address: false
    instance-id: ${EUREKA_INSTANCE_HOSTNAME:compliance-event}:${PORT:8080}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  public-key: ${JWT_PUBLIC_KEY_PATH:file:/run/secrets/jwt_public.pem}
  private-key: ${JWT_PRIVATE_KEY_PATH:file:/run/secrets/jwt_private.pem}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}

finsight:
  suspect-registry:
    url: ${SUSPECT_REGISTRY_URL}

  # NEW: must be set in prod environment/task definition
  documents-cases:
    url: ${DOCUMENTS_CASES_URL}
