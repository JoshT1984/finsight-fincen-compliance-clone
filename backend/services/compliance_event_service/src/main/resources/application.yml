server:
  port: ${PORT:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

spring:
  application:
    name: compliance-event-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/compliance_event}
    username: ${DB_USER:mysql}
    password: ${DB_PASS:mysql}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC

  # For MVP/local, SQL init is fine. In shared envs, prefer Flyway.
  sql:
    init:
      mode: always
      platform: mysql
      continue-on-error: false

aws:
  region: ${AWS_REGION:us-east-1}

  sqs:
    # This service typically CONSUMES events published by ctr_sar_service
    # and writes normalized rows into compliance_event + detail tables.
    ctrEventsQueueUrl: ${CTR_EVENTS_QUEUE_URL:}
    sarEventsQueueUrl: ${SAR_EVENTS_QUEUE_URL:}
    linkEventsQueueUrl: ${LINK_EVENTS_QUEUE_URL:}
    auditActionsQueueUrl: ${AUDIT_ACTIONS_QUEUE_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.finsight: INFO
