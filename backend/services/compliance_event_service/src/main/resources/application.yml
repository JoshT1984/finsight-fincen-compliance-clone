server:
    port: 8085

cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

spring:
    application:
        name: compliance-event-service

    datasource:
        url: jdbc:mysql://localhost:3306/compliance_event
        username: root
        password: password
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: none
        open-in-view: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
                jdbc:
                    time_zone: UTC

    rabbitmq:
        host: ${RABBITMQ_HOST:localhost}
        port: ${RABBITMQ_PORT:5672}
        username: ${RABBITMQ_USERNAME:guest}
        password: ${RABBITMQ_PASSWORD:guest}
        virtual-host: /
        ssl:
            enabled: false

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/

# Optional: when set, CTR/SAR events with parsed SSN will be auto-linked to matching suspects
finsight:
  suspect-registry:
    url: ${SUSPECT_REGISTRY_URL:http://localhost:8082}

jwt:
   public-key: ${JWT_PUBLIC_KEY_PATH:file:/run/secrets/jwt_public.pem}
   private-key: ${JWT_PRIVATE_KEY_PATH:file:/run/secrets/jwt_private.pem}			

management:
    endpoint:
        health:
            probes:
                enabled: true
    endpoints:
        web:
            exposure:
                include: health
logging:
    level:
        root: info