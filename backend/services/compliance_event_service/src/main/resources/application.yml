server:
    port: 8085

cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

spring:
    application:
        name: compliance-event-service

    datasource:
        url: jdbc:mysql://localhost:3306/compliance_event
        username: root
        password: Laura_W3ll3r
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: none
        open-in-view: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
                jdbc:
                    time_zone: UTC

    rabbitmq:
        host: ${RABBITMQ_HOST:localhost}
        port: ${RABBITMQ_PORT:5672}
        username: ${RABBITMQ_USERNAME:guest}
        password: ${RABBITMQ_PASSWORD:guest}
        virtual-host: /
        ssl:
            enabled: false

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/

management:
    endpoint:
        health:
            probes:
                enabled: true
    endpoints:
        web:
            exposure:
                include: health
jwt:
    public-key: file:/C:/public_key.pem
    private-key: file:/C:/private_key.pem
