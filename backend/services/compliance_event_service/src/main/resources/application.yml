server:
  port: 8085

cors:
  allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:4200}"

spring:
  application:
    name: compliance-event-service

  datasource:
    url: "${DB_URL:jdbc:mysql://127.0.0.1:13306/compliance_event?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}"
    username: "${DB_USER:admin}"
    password: "${DB_PASS:swordfish$fincen1117}"
    driver-class-name: com.mysql.cj.jdbc.Driver

  web:
    resources:
      add-mappings: false

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC

  servlet:
    multipart:
      max-file-size: "${MAX_FILE_SIZE:25MB}"
      max-request-size: "${MAX_REQUEST_SIZE:25MB}"

  rabbitmq:
    host: 127.0.0.1
    port: "${RABBITMQ_PORT:5672}"
    username: "${RABBITMQ_USERNAME:guest}"
    password: "${RABBITMQ_PASSWORD:guest}"
    virtual-host: "${RABBITMQ_VIRTUAL_HOST:/}"
    connection-timeout: 30000

  sql:
    init:
      mode: "${SQL_INIT_MODE:never}"
      platform: mysql
      continue-on-error: false

  mail:
    host: email-smtp.us-east-1.amazonaws.com
    port: 587
    username: "${SES_SMTP_USERNAME:}"
    password: "${SES_SMTP_PASSWORD:}"

jwt:
  public-key: ${JWT_PUBLIC_KEY:file:/Users/xxblackhawkdevxx/Downloads/secrets/jwt_public.pem}
  private-key: ${JWT_PRIVATE_KEY:file:/Users/xxblackhawkdevxx/Downloads/secrets/jwt_private.pem}

aws:
  region: "${AWS_REGION:us-east-1}"
  dynamodb:
    endpoint: "${DDB_ENDPOINT:}"
  s3:
    bucket: "${DOCS_BUCKET:finsight-documents-2026}"

eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_SERVER_URL:http://localhost:8761/eureka/}"
#updated to match the new service name
finsight:
  rabbitmq:
    queues:
      auth-events: "${AUTH_EVENTS_QUEUE:finsight.auth.events}"
  documents-cases:
    url: "${DOCUMENTS_CASES_URL:http://localhost:8081}"
  suspect-registry:
    url: "${SUSPECT_REGISTRY_URL:http://localhost:8082}"
  identity-auth-service:
    url: "${IDENTITY_AUTH_SERVICE_URL:http://localhost:8083}"
  mq-gateway:
    url: "${MQ_GATEWAY_URL:http://localhost:8084}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,env,configprops
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    com.zaxxer.hikari: DEBUG
    org.springframework.jdbc.datasource: DEBUG
    root: INFO
    com.finsight: INFO
