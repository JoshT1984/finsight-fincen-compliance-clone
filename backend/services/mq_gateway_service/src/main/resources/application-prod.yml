server:
  port: ${PORT:8080}

spring:
  profiles:
    active: prod

  application:
    name: mq-gateway-service

  datasource:
    # Use DB_URL if explicitly provided, else build from parts.
    # Pick the correct schema name for this service.
    # If mq-gateway truly needs a DB, set DB_NAME to its schema (example: mq_gateway).
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mq_gateway}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5671}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:true}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:mq-gateway-service}
    prefer-ip-address: false
    instance-id: ${EUREKA_INSTANCE_HOSTNAME:mq-gateway-service}:${PORT:8080}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

# Add this ONLY if mq-gateway validates JWTs (most gateways do).
jwt:
  public-key: ${JWT_PUBLIC_KEY}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:}
