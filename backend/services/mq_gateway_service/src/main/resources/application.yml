server:
  port: ${PORT:8080}

spring:
  application:
    name: mq-gateway-service

  rabbitmq:
    addresses: ${RABBITMQ_ADDRESSES:amqp://localhost:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    rabbit:
      enabled: true
