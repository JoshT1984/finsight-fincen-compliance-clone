server:
  port: 8084

spring:
  application:
    name: mq-gateway-service

  rabbitmq:
    # Force IPv4 to avoid localhost -> ::1 issues on macOS
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: "/"
    ssl:
      enabled: false
      connection-timeout: 30000

eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_SERVER_URL:http://localhost:8761/eureka/}"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
