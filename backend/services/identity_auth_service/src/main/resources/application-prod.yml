server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

spring:
  application:
    name: identity-auth-service

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientWebMvcSecurityAutoConfiguration

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: UTC

  sql:
    init:
      mode: ${SQL_INIT_MODE:never}

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:25MB}
      max-request-size: ${MAX_REQUEST_SIZE:25MB}

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5671}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:true}

    # security:
    #   oauth2:
    #     client:
    #       registration:
    #         google:
    #           client-id: ${GOOGLE_CLIENT_ID:}
    #           client-secret: ${GOOGLE_CLIENT_SECRET:}
    #           scope:
    #             - openid
    #             - profile
    #             - email
    #           redirect-uri: ${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/google}
    #         github:
    #           client-id: ${GITHUB_CLIENT_ID:}
    #           client-secret: ${GITHUB_CLIENT_SECRET:}
    #           scope:
    #             - user:email
    #           redirect-uri: ${GITHUB_REDIRECT_URI:{baseUrl}/login/oauth2/code/github}
    #       provider:
    #         github:
    #           authorization-uri: https://github.com/login/oauth/authorize
    #           token-uri: https://github.com/login/oauth/access_token
    #           user-info-uri: https://api.github.com/user
    #         google:
    #           authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
    #           token-uri: https://oauth2.googleapis.com/token
    #           user-info-uri: https://openidconnect.googleapis.com/v1/userinfo

  # Removed duplicate sql, servlet, and rabbitmq blocks below. Please merge any unique settings above if needed.
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: http://localhost:8080/login/oauth2/code/google
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
            redirect-uri: http://localhost:8080/login/oauth2/code/github
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
  mail:
    host: email-smtp.us-east-1.amazonaws.com
    port: 587
    username: ${SES_SMTP_USERNAME}
    password: ${SES_SMTP_PASSWORD}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:identity-auth}
    prefer-ip-address: false
    instance-id: ${EUREKA_INSTANCE_HOSTNAME:identity-auth}:${PORT:8080}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

logging:
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
