server:
    port: ${PORT:8080}
    shutdown: graceful
    forward-headers-strategy: framework

spring:
    application:
        name: identity-auth-service

    autoconfigure:
        exclude:
            - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
            - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientWebMvcSecurityAutoConfiguration

    datasource:
        url: ${DB_URL}
        username: ${DB_USER}
        password: ${DB_PASS}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
            maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
            minimum-idle: ${DB_POOL_MIN_IDLE:2}
            idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
            max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
            connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}

    jpa:
        hibernate:
            ddl-auto: none
        open-in-view: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQL8Dialect
                jdbc:
                    time_zone: UTC

    sql:
        init:
            mode: ${SQL_INIT_MODE:never}

    servlet:
        multipart:
            max-file-size: ${MAX_FILE_SIZE:25MB}
            max-request-size: ${MAX_REQUEST_SIZE:25MB}

    rabbitmq:
        host: ${RABBITMQ_HOST}
        port: ${RABBITMQ_PORT:5671}
        username: ${RABBITMQ_USERNAME}
        password: ${RABBITMQ_PASSWORD}
        virtual-host: ${RABBITMQ_VHOST:/}
        ssl:
            enabled: ${RABBITMQ_SSL_ENABLED:true}

        # security:
        #   oauth2:
        #     client:
        #       registration:
        #         google:
        #           client-id: ${GOOGLE_CLIENT_ID:}
        #           client-secret: ${GOOGLE_CLIENT_SECRET:}
        #           scope:
        #             - openid
        #             - profile
        #             - email
        #           redirect-uri: ${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/google}
        #         github:
        #           client-id: ${GITHUB_CLIENT_ID:}
        #           client-secret: ${GITHUB_CLIENT_SECRET:}
        #           scope:
        #             - user:email
        #           redirect-uri: ${GITHUB_REDIRECT_URI:{baseUrl}/login/oauth2/code/github}
        #       provider:
        #         github:
        #           authorization-uri: https://github.com/login/oauth/authorize
        #           token-uri: https://github.com/login/oauth/access_token
        #           user-info-uri: https://api.github.com/user
        #         google:
        #           authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
        #           token-uri: https://oauth2.googleapis.com/token
        #           user-info-uri: https://openidconnect.googleapis.com/v1/userinfo

    sql:
        init:
            mode: ${SQL_INIT_MODE:never}
    servlet:
        multipart:
            max-file-size: ${MAX_FILE_SIZE:25MB}
            max-request-size: ${MAX_REQUEST_SIZE:25MB}
    rabbitmq:
        host: ${RABBITMQ_HOST:localhost}
        port: ${RABBITMQ_PORT:5672}
        username: ${RABBITMQ_USERNAME:guest}
        password: ${RABBITMQ_PASSWORD:guest}
        virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
        connection-timeout: 30000
    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: "${GOOGLE_CLIENT_ID}"
                        client-secret: "${GOOGLE_CLIENT_SECRET}"
                        scope:
                            - openid
                            - profile
                            - email
                        redirect-uri: "${GOOGLE_REDIRECT_URI:http://localhost:8083/login/oauth2/code/google}"
                    github:
                        client-id: "${GITHUB_CLIENT_ID}"
                        client-secret: "${GITHUB_CLIENT_SECRET}"
                        scope:
                            - user:email
                        redirect-uri: "${GITHUB_REDIRECT_URI:http://localhost:8083/login/oauth2/code/github}"
                provider:
                    github:
                        authorization-uri: https://github.com/login/oauth/authorize
                        token-uri: https://github.com/login/oauth/access_token
                        user-info-uri: https://api.github.com/user
                    google:
                        authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
                        token-uri: https://oauth2.googleapis.com/token
                        user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
    mail:
        host: email-smtp.us-east-1.amazonaws.com
        port: 587
        username: ${SES_SMTP_USERNAME}
        password: ${SES_SMTP_PASSWORD}
jwt:
    private-key: ${JWT_PRIVATE_KEY}
    public-key: ${JWT_PUBLIC_KEY}

eureka:
    client:
        service-url:
            defaultZone: ${EUREKA_SERVER_URL}
        register-with-eureka: true
        fetch-registry: true
    instance:
        hostname: ${EUREKA_INSTANCE_HOSTNAME:identity-auth}
        prefer-ip-address: false
        instance-id: ${EUREKA_INSTANCE_HOSTNAME:identity-auth}:${PORT:8080}
        lease-renewal-interval-in-seconds: 10
        lease-expiration-duration-in-seconds: 30

finsight:
    rabbitmq:
        queues:
            auth-events: ${AUTH_EVENTS_QUEUE:finsight.auth.events}

aws:
    region: ${AWS_REGION:us-east-1}
    dynamodb:
        endpoint: ${DDB_ENDPOINT:}
    s3:
        bucket: ${AWS_S3_BUCKET}

logging:
    level:
        root: INFO
        com.finsight: INFO

management:
    endpoints:
        web:
            exposure:
                include: health,info
    endpoint:
        health:
            probes:
                enabled: true
