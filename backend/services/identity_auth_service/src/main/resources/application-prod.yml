server:
    port: ${PORT:8080}

spring:
    application:
        name: identity-auth-service

    datasource:
        url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:identity}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
        username: ${DB_USER}
        password: ${DB_PASS}
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: none
        open-in-view: false
        properties:
            hibernate:
                jdbc:
                    time_zone: UTC

    rabbitmq:
        host: ${RABBITMQ_HOST}
        port: ${RABBITMQ_PORT:5672}
        username: ${RABBITMQ_USERNAME}
        password: ${RABBITMQ_PASSWORD}
        virtual-host: ${RABBITMQ_VHOST:/}
        ssl:
            enabled: ${RABBITMQ_SSL_ENABLED:true}

    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: ${GOOGLE_CLIENT_ID}
                        client-secret: ${GOOGLE_CLIENT_SECRET}
                        scope:
                            - openid
                            - profile
                            - email
                        redirect-uri: ${GOOGLE_REDIRECT_URI}
                    github:
                        client-id: ${GITHUB_CLIENT_ID}
                        client-secret: ${GITHUB_CLIENT_SECRET}
                        scope:
                            - user:email
                        redirect-uri: ${GITHUB_REDIRECT_URI}
                provider:
                    github:
                        authorization-uri: https://github.com/login/oauth/authorize
                        token-uri: https://github.com/login/oauth/access_token
                        user-info-uri: https://api.github.com/user
                    google:
                        authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
                        token-uri: https://oauth2.googleapis.com/token
                        user-info-uri: https://openidconnect.googleapis.com/v1/userinfo

eureka:
    client:
        service-url:
            defaultZone: ${EUREKA_SERVER_URL}
        register-with-eureka: true
        fetch-registry: true
    instance:
        hostname: ${EUREKA_INSTANCE_HOSTNAME:identity-auth}
        prefer-ip-address: false
        instance-id: ${EUREKA_INSTANCE_HOSTNAME:identity-auth}:${PORT:8080}

management:
    endpoint:
        health:
            probes:
                enabled: true
    endpoints:
        web:
            exposure:
                include: health,info

# FIX: this is the missing property that crashed JwtConfig in your logs.
# Provide it via a secret/env var in prod.
# If you store the PEM with literal "\n", Spring can still handle it if your JwtConfig normalizes newlines.
jwt:
    public-key: ${JWT_PUBLIC_KEY_PATH:file:/run/secrets/jwt_public.pem}
    private-key: ${JWT_PRIVATE_KEY_PATH:file:/run/secrets/jwt_private.pem}

aws:
    s3:
        bucket: ${AWS_S3_BUCKET}
