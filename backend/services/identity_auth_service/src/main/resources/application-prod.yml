server:
    port: ${PORT:8080}
    shutdown: graceful

spring:
    application:
        name: identity-auth-service

    datasource:
        url: ${DB_URL}
        username: ${DB_USER}
        password: ${DB_PASS}
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: none
        open-in-view: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQL8Dialect
                jdbc:
                    time_zone: UTC

    sql:
        init:
            mode: ${SQL_INIT_MODE:never}
    servlet:
        multipart:
            max-file-size: ${MAX_FILE_SIZE:25MB}
            max-request-size: ${MAX_REQUEST_SIZE:25MB}
    rabbitmq:
        host: ${RABBITMQ_HOST:localhost}
        port: ${RABBITMQ_PORT:5672}
        username: ${RABBITMQ_USERNAME:guest}
        password: ${RABBITMQ_PASSWORD:guest}
        virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
        connection-timeout: 30000
    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: ${GOOGLE_CLIENT_ID}
                        client-secret: ${GOOGLE_CLIENT_SECRET}
                        scope:
                            - openid
                            - profile
                            - email
                        redirect-uri: http://localhost:8080/login/oauth2/code/google
                    github:
                        client-id: ${GITHUB_CLIENT_ID}
                        client-secret: ${GITHUB_CLIENT_SECRET}
                        scope:
                            - user:email
                        redirect-uri: http://localhost:8080/login/oauth2/code/github
                provider:
                    github:
                        authorization-uri: https://github.com/login/oauth/authorize
                        token-uri: https://github.com/login/oauth/access_token
                        user-info-uri: https://api.github.com/user
                    google:
                        authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
                        token-uri: https://oauth2.googleapis.com/token
                        user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
jwt:
    private-key: ${JWT_PRIVATE_KEY}
    public-key: ${JWT_PUBLIC_KEY}
eureka:
    client:
        service-url:
            defaultZone: ${EUREKA_SERVER_URL}
        register-with-eureka: true
        fetch-registry: true
    instance:
        hostname: ${EUREKA_INSTANCE_HOSTNAME:identity-auth}
        prefer-ip-address: false
        instance-id: ${EUREKA_INSTANCE_HOSTNAME:identity-auth}:${PORT:8080}
        lease-renewal-interval-in-seconds: 10
        lease-expiration-duration-in-seconds: 30
finsight:
    rabbitmq:
        queues:
            auth-events: ${AUTH_EVENTS_QUEUE:finsight.auth.events}
aws:
    region: ${AWS_REGION:us-east-1}

    dynamodb:
        endpoint: ${DDB_ENDPOINT:}

    s3:
        bucket: ${DOCS_BUCKET:finsight-documents-2026}
logging:
    level:
        root: INFO
        com.finsight: INFO
management:
    endpoints:
        web:
            exposure:
                include: health,info
    endpoint:
        health:
            probes:
                enabled: true
