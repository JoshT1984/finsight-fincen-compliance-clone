server:
    port: 8083

cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:4200}"

spring:
    application:
        name: identity-auth-service

    datasource:
        url: "${DB_URL:jdbc:mysql://127.0.0.1:13306/identity?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}"
        username: "${DB_USER:admin}"
        password: "${DB_PASS:swordfish$fincen1117}"
        driver-class-name: com.mysql.cj.jdbc.Driver

    web:
        resources:
            add-mappings: false

    jpa:
        hibernate:
            ddl-auto: none
        open-in-view: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
                jdbc:
                    time_zone: UTC

    servlet:
        multipart:
            max-file-size: "${MAX_FILE_SIZE:25MB}"
            max-request-size: "${MAX_REQUEST_SIZE:25MB}"

    rabbitmq:
        host: 127.0.0.1
        port: "${RABBITMQ_PORT:5672}"
        username: "${RABBITMQ_USERNAME:guest}"
        password: "${RABBITMQ_PASSWORD:guest}"
        virtual-host: "${RABBITMQ_VIRTUAL_HOST:/}"
        connection-timeout: 30000

    sql:
        init:
            mode: "${SQL_INIT_MODE:never}"
            platform: mysql
            continue-on-error: false

    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: ${GOOGLE_CLIENT_ID}
                        client-secret: ${GOOGLE_CLIENT_SECRET}
                        scope:
                            - openid
                            - profile
                            - email
                        redirect-uri: ${GOOGLE_REDIRECT_URI}
                    github:
                        client-id: ${GITHUB_CLIENT_ID}
                        client-secret: ${GITHUB_CLIENT_SECRET}
                        scope:
                            - user:email
                        redirect-uri: ${GITHUB_REDIRECT_URI}
                provider:
                    github:
                        authorization-uri: https://github.com/login/oauth/authorize
                        token-uri: https://github.com/login/oauth/access_token
                        user-info-uri: https://api.github.com/user
                    google:
                        authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
                        token-uri: https://oauth2.googleapis.com/token
                        user-info-uri: https://openidconnect.googleapis.com/v1/userinfo

    mail:
        host: email-smtp.us-east-1.amazonaws.com
        port: 587
        username: "${SES_SMTP_USERNAME}"
        password: "${SES_SMTP_PASSWORD}"

frontend:
    frontend_url: "${FRONTEND_URL:http://localhost:4200}"

jwt:
    public-key: file:${JWT_PUBLIC_KEY:/Users/xxblackhawkdevxx/Downloads/secrets/jwt_public.pem}
    private-key: file:${JWT_PRIVATE_KEY:/Users/xxblackhawkdevxx/Downloads/secrets/jwt_private.pem}

finsight:
    rabbitmq:
        queues:
            auth-events: "${AUTH_EVENTS_QUEUE:finsight.auth.events}"

aws:
    region: "${AWS_REGION:us-east-1}"
    dynamodb:
        endpoint: "${DDB_ENDPOINT:}"
    s3:
        bucket: "${DOCS_BUCKET:finsight-documents-2026}"

eureka:
    client:
        service-url:
            defaultZone: "${EUREKA_SERVER_URL:http://localhost:8761/eureka/}"

management:
    endpoints:
        web:
            exposure:
                include: health,info,env,configprops
    endpoint:
        health:
            show-details: always
            probes:
                enabled: true

logging:
    level:
        com.zaxxer.hikari: ERROR
        org.springframework.jdbc.datasource: ERROR
        root: ERROR
        com.finsight: ERROR
