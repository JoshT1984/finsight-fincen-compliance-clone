server:
    port: ${PORT:8080}
    shutdown: graceful

spring:
    application:
        name: identity-auth-service
    config:
        import: "optional:file:.env.dev"

    datasource:
        url: ${DB_URL:jdbc:mysql://localhost:3306/finsight?useSSL=false&serverTimezone=UTC}
        username: ${DB_USER:root}
        password: ${DB_PASS:Laura_W3ll3r}
        driver-class-name: com.mysql.cj.jdbc.Driver

    lifecycle:
        timeout-per-shutdown-phase: 20s

    jpa:
        hibernate:
            ddl-auto: none
        open-in-view: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQL8Dialect

    sql:
        init:
            mode: always
            platform: mysql
            continue-on-error: false
management:
    endpoints:
        web:
            exposure:
                include: health,info
    endpoint:
        health:
            probes:
                enabled: true

logging:
    level:
        root: INFO
        com.finsight: INFO
