server:
  port: ${PORT:8083}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

spring:
  application:
    name: identity-auth-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/finsight}
    username: ${DB_USER:root}
    password: ${DB_PASS:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: UTC

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:25MB}
      max-request-size: ${MAX_REQUEST_SIZE:25MB}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
    connection-timeout: 30000

  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
      platform: mysql
      continue-on-error: false

jwt:
  private-key: ${JWT_PRIVATE_KEY:}
  public-key: ${JWT_PUBLIC_KEY:}

finsight:
  rabbitmq:
    queues:
      auth-events: ${AUTH_EVENTS_QUEUE:finsight.auth.events}

aws:
  region: ${AWS_REGION:us-east-1}
  dynamodb:
    endpoint: ${DDB_ENDPOINT:}
  s3:
    bucket: ${DOCS_BUCKET:finsight-documents-2026}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.finsight: INFO
