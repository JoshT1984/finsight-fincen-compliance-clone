server:
    port: "${PORT:8083}"

cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:4200}"

spring:
    application:
        name: identity-auth-service

    datasource:
        url: "${DB_URL:jdbc:mysql://localhost:3306/finsight}"
        username: "${DB_USER:root}"
        password: "${DB_PASS:password}"
        driver-class-name: com.mysql.cj.jdbc.Driver

    web:
        resources:
            add-mappings: false

    jpa:
        hibernate:
            ddl-auto: none
        open-in-view: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQL8Dialect
                jdbc:
                    time_zone: UTC
    profiles:
        active: dev

    servlet:
        multipart:
            max-file-size: "${MAX_FILE_SIZE:25MB}"
            max-request-size: "${MAX_REQUEST_SIZE:25MB}"

    rabbitmq:
        host: "${RABBITMQ_HOST:localhost}"
        port: "${RABBITMQ_PORT:5672}"
        username: "${RABBITMQ_USERNAME:guest}"
        password: "${RABBITMQ_PASSWORD:guest}"
        virtual-host: "${RABBITMQ_VIRTUAL_HOST:/}"
        connection-timeout: 30000

    sql:
        init:
            mode: "${SQL_INIT_MODE:always}"
            platform: mysql
            continue-on-error: false
    mail:
        host: email-smtp.us-east-1.amazonaws.com
        port: 587
        username: ${SES_SMTP_USERNAME}
        password: ${SES_SMTP_PASSWORD}

    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: "${GOOGLE_CLIENT_ID}"
                        client-secret: "${GOOGLE_CLIENT_SECRET}"
                        scope:
                            - openid
                            - profile
                            - email
                        redirect-uri: "${GOOGLE_REDIRECT_URI:http://localhost:8083/login/oauth2/code/google}"
                    github:
                        client-id: "${GITHUB_CLIENT_ID}"
                        client-secret: "${GITHUB_CLIENT_SECRET}"
                        scope:
                            - user:email
                        redirect-uri: "${GITHUB_REDIRECT_URI:http://localhost:8083/login/oauth2/code/github}"
                provider:
                    github:
                        authorization-uri: https://github.com/login/oauth/authorize
                        token-uri: https://github.com/login/oauth/access_token
                        user-info-uri: https://api.github.com/user
                    google:
                        authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
                        token-uri: https://oauth2.googleapis.com/token
                        user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
    mail:
        host: email-smtp.us-east-1.amazonaws.com
        port: 587
        username: ${SES_SMTP_USERNAME}
        password: ${SES_SMTP_PASSWORD}

jwt:
    private-key: "${JWT_PRIVATE_KEY:}"
    public-key: "${JWT_PUBLIC_KEY:}"

finsight:
    rabbitmq:
        queues:
            auth-events: "${AUTH_EVENTS_QUEUE:finsight.auth.events}"

aws:
    region: "${AWS_REGION:us-east-1}"
    dynamodb:
        endpoint: "${DDB_ENDPOINT:}"
    s3:
        bucket: "${DOCS_BUCKET:finsight-documents-2026}"

eureka:
    client:
        service-url:
            defaultZone: "${EUREKA_SERVER_URL:http://localhost:8761/eureka/}"

management:
    endpoints:
        web:
            exposure:
                include: health,info
    endpoint:
        health:
            probes:
                enabled: true

logging:
    level:
        root: INFO
        com.finsight: INFO
