server:
  port: ${PORT:8080}

spring:
  application:
    name: transactions-ctr-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/finsight}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      platform: postgres
      continue-on-error: false

aws:
  region: ${AWS_REGION:us-east-1}

  sqs:
    # Transactions/CTR can publish events to these queues (or just one)
    ctrQueueUrl: ${CTR_QUEUE_URL:}
    caseQueueUrl: ${CASE_QUEUE_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.finsight: INFO
